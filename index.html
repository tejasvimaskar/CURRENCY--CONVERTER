<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter Pro</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-currency-exchange"></i> Converter Pro
        </a>
    </div>
</nav>

<header class="text-center py-5 header-section">
    <div class="container">
        <h1 class="fw-bold">Currency Converter</h1>
        <p class="lead">Fast • Simple • Modern</p>
    </div>
</header>

<div class="container py-4">

    <div class="row g-4">

        <!-- DASHBOARD -->
        <div class="col-md-4">
            <div class="card custom-card h-100">
                <div class="card-body">
                    <h5 class="fw-bold">Dashboard</h5>
                    <p>Convert currencies easily</p>

                    <div class="box">💰 3+ Currencies</div>
                    <div class="box">⚡ Fast Conversion</div>
                    <div class="box">🔒 Secure</div>
                </div>
            </div>
        </div>

        <!-- CONVERTER -->
        <div class="col-md-4">
            <div class="card custom-card h-100 text-center">
                <div class="card-body">

                    <h5 class="fw-bold mb-3">Converter</h5>

                    <input type="number" id="amount" class="form-control mb-3" placeholder="Enter Amount">

                    <select id="from" class="form-select mb-2">
                        <option value="INR">INR (₹)</option>
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                    </select>

                    <select id="to" class="form-select mb-3">
                        <option value="USD">USD ($)</option>
                        <option value="INR">INR (₹)</option>
                        <option value="EUR">EUR (€)</option>
                    </select>

                    <button onclick="convert()" class="btn custom-btn w-100 mb-3">
                        Convert
                    </button>

                    <h3 id="result">₹0</h3>

                </div>
            </div>
        </div>

        <!-- RATES -->
        <div class="col-md-4">
            <div class="card custom-card h-100">
                <div class="card-body">
                    <h5 class="fw-bold">Rates</h5>
                    <p>1 USD ≈ ₹83</p>
                    <p>1 EUR ≈ ₹90</p>
                </div>
            </div>
        </div>

    </div>

</div>

<footer class="text-center py-3">
    <p>© 2026 Converter | Made in India 🇮🇳</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function convert() {
    let amount = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if(!amount) {
        alert("Enter amount!");
        return;
    }

    let rates = {
        INR: 1,
        USD: 83,
        EUR: 90
    };

    let result = (amount / rates[from]) * rates[to];

    document.getElementById("result").innerHTML =
        result.toFixed(2) + " " + to;
}
</script>

</body>
</html>
